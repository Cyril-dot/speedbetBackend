# ============================================================
# SpeedBet API ? application.properties
# All secrets and config values are read from environment variables.
# Copy .env.example to .env and fill in real values.
# ============================================================

spring.application.name=speedbet-api
server.port=8080

# ?? Database ??????????????????????????????????????????????
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

# ?? JPA / Hibernate ???????????????????????????????????????
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.type.preferred_enum_jdbc_type=VARCHAR
spring.jpa.open-in-view=false

# ?? Flyway ????????????????????????????????????????????????
spring.flyway.enabled=false
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false

# ?? JWT ???????????????????????????????????????????????????
app.jwt.secret=${JWT_SECRET}
app.jwt.access-token-expiry-minutes=${JWT_ACCESS_TTL_MINUTES:30}
app.jwt.refresh-token-expiry-days=${JWT_REFRESH_TTL_DAYS:14}

# ?? 2FA ???????????????????????????????????????????????????
app.2fa.issuer=${APP_2FA_ISSUER:SpeedBet}
app.2fa.window=${APP_2FA_WINDOW:1}

# ?? Payments ??????????????????????????????????????????????
app.paystack.secret-key=${PAYSTACK_SECRET_KEY}
app.paystack.public-key=${PAYSTACK_PUBLIC_KEY}
app.paystack.webhook-secret=${PAYSTACK_WEBHOOK_SECRET}
app.paystack.base-url=https://api.paystack.co

app.stripe.secret-key=${STRIPE_SECRET_KEY}
app.stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET}

# ?? Email ?????????????????????????????????????????????????
app.email.resend-api-key=${RESEND_API_KEY}
app.email.brevo-api-key=${BREVO_API_KEY}
app.email.from-name=${EMAIL_FROM_NAME:SpeedBet}
app.email.from-address=${EMAIL_FROM_ADDRESS:noreply@speedbet.app}
app.email.frontend-url=${FRONTEND_URL:http://localhost:5173}

# ?? Sports Data APIs ??????????????????????????????????????
app.sports.api-football-key=${API_FOOTBALL_KEY}
app.sports.api-football-base-url=https://api-football.com/v3

app.sports.sportsdataio-api-key=${SPORTSDATAIO_API_KEY}
app.sports.sportsdataio-base-url=https://api.sportsdata.io

app.sports.sportdb-api-key=${SPORTDB_API_KEY}
app.sports.sportdb-base-url=https://api.sportdb.dev

app.sports.sportsrc-api-key=${SPORTSRC_API_KEY}
app.sports.sportsrc-base-url=https://sportsrc.org/v2

# ?? AI ????????????????????????????????????????????????????
app.ai.mistral-api-key=${MISTRAL_API_KEY}
app.ai.mistral-model=${MISTRAL_MODEL:mistralai/mistral-small-4-119b-2603}
app.ai.mistral-base-url=${MISTRAL_BASE_URL:https://integrate.api.nvidia.com/v1}

app.ai.groq-api-key=${GROQ_API_KEY}
app.ai.groq-model=${GROQ_MODEL:llama3-8b-8192}
app.ai.groq-base-url=https://api.groq.com/openai/v1

app.ai.huggingface-api-key=${HUGGINGFACE_API_KEY}
app.ai.huggingface-model=${HUGGINGFACE_MODEL:mistralai/Mistral-7B-Instruct-v0.2}
app.ai.huggingface-base-url=https://api-inference.huggingface.co

# ?? Platform Config ???????????????????????????????????????
app.platform.min-deposit-amount=${MIN_DEPOSIT_AMOUNT:300}
app.platform.min-deposit-currency=${MIN_DEPOSIT_CURRENCY:GHS}
app.platform.admin-commission-percent=${ADMIN_COMMISSION_PERCENT:10}
app.platform.referral-signup-bonus=${REFERRAL_SIGNUP_BONUS:50}
app.platform.payout-day-of-week=${PAYOUT_DAY_OF_WEEK:FRIDAY}
app.platform.demo-mode=${DEMO_MODE:false}
app.platform.frontend-url=${FRONTEND_URL:http://localhost:5173}

# ?? Super Admin ???????????????????????????????????????????
app.super-admin.path=${SUPER_ADMIN_DIRECT_PATH}

# ?? Withdrawal ????????????????????????????????????????????
app.withdrawal.min-amount=${MIN_WITHDRAWAL_AMOUNT:10}
app.withdrawal.max-amount=${MAX_WITHDRAWAL_AMOUNT:5000}
app.withdrawal.daily-limit=${WITHDRAWAL_DAILY_LIMIT:10000}

# ?? VIP ???????????????????????????????????????????????????
app.vip.membership-price=${VIP_MEMBERSHIP_PRICE:250}
app.vip.membership-currency=${VIP_MEMBERSHIP_CURRENCY:GHS}
app.vip.membership-days=${VIP_MEMBERSHIP_DAYS:30}
app.vip.cashback-min-selections=${VIP_CASHBACK_MIN_SELECTIONS:10}
app.vip.cashback-percent=${VIP_CASHBACK_PERCENT:1.00}
app.vip.cashback-min-stake=${VIP_CASHBACK_MIN_STAKE:10}
app.vip.cashback-weekly-cap=${VIP_CASHBACK_WEEKLY_CAP:1000}

# ?? Crash AI Engine ???????????????????????????????????????
app.crash.high-threshold=${CRASH_HIGH_THRESHOLD:10.0}
app.crash.extreme-threshold=${CRASH_EXTREME_THRESHOLD:20.0}
app.crash.schedule-buffer=${CRASH_SCHEDULE_BUFFER:100}
app.crash.batch-size=${CRASH_BATCH_SIZE:50}
app.crash.replenish-interval-hours=${CRASH_REPLENISH_INTERVAL_HOURS:1}
app.crash.alert-lookahead-rounds=${CRASH_ALERT_LOOKAHEAD_ROUNDS:3}
app.crash.card-storage-path=${CRASH_CARD_STORAGE_PATH:./uploads/crash-cards}
app.crash.fallback-seed=${CRASH_FALLBACK_SEED:42}

# ?? Cache (Caffeine) ??????????????????????????????????????
spring.cache.type=caffeine
spring.cache.cache-names=matches,odds,predictions,adminKpis,config,liveScores,featuredMatches,vipStatus,userProfiles,standings,top6Live
spring.cache.caffeine.spec=maximumSize=1000,expireAfterWrite=60s

# ?? WebSocket ?????????????????????????????????????????????
spring.websocket.path=/ws

# ?? Scheduling ????????????????????????????????????????????
spring.task.scheduling.pool.size=15

# ?? Actuator ??????????????????????????????????????????????
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# ?? Jackson ???????????????????????????????????????????????
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC
spring.jackson.default-property-inclusion=non_null

# ?? Logging ???????????????????????????????????????????????
logging.level.com.speedbet=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN

# ?? Sentry ????????????????????????????????????????????????
app.sentry.dsn=${SENTRY_DSN}
app.sentry.environment=${SENTRY_ENVIRONMENT:development}

# ?? Upstash Redis ?????????????????????????????????????????
app.upstash.redis-url=${UPSTASH_REDIS_URL}
app.upstash.rest-url=${UPSTASH_REST_URL}
app.upstash.rest-token=${UPSTASH_REST_TOKEN}
